apis:
  - aid: microsoft-azure-app-service:azure-app-service-api
    name: Azure App Service API
    description: >-
      The Azure App Service REST API enables programmatic management of web apps,
      app service plans, deployment slots, custom domains, SSL certificates, and application
      settings. It supports continuous deployment, auto-scaling, authentication configuration,
      and hybrid connections through Azure Resource Manager endpoints.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
